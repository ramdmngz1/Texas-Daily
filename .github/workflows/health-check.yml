name: Dependency & Health Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 9am UTC
  workflow_dispatch:

jobs:
  ios-dependencies:
    name: iOS Dependency Audit
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Check for SPM updates
        run: |
          cd iOS
          xcodebuild -resolvePackageDependencies \
            -project "Texas Daily.xcodeproj" \
            -scheme "Texas Daily" 2>&1 | tee spm-resolve.log
          echo "## SPM packages resolved successfully" >> $GITHUB_STEP_SUMMARY

      - name: Build health check
        run: |
          xcodebuild build \
            -project "iOS/Texas Daily.xcodeproj" \
            -scheme "Texas Daily" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --color

  android-dependencies:
    name: Android Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/Project
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Check for dependency updates
        run: |
          ./gradlew dependencyUpdates -Drevision=release 2>/dev/null || true
          echo "## Dependency check complete" >> $GITHUB_STEP_SUMMARY

      - name: Build health check
        run: ./gradlew assembleDebug

      - name: Security scan (lint)
        run: ./gradlew lintDebug
